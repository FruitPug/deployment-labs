---
name: CI
on:  # yamllint disable-line rule:truthy
  push: null
  pull_request: null
  workflow_dispatch: null
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('lab3/pom.xml') }}
      - name: Run Maven verification
        run: mvn verify -DskipTests
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          find scripts -type f -name "*.sh" -exec shellcheck {} \;
      - name: Install Yamllint
        run: sudo apt-get install -y yamllint
      - name: Run Yamllint
        run: yamllint .
      - name: Install Hadolint
        run: >
          wget -O /usr/local/bin/hadolint
          https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64

          chmod +x /usr/local/bin/hadolint
      - name: Run Hadolint
        run: hadolint Dockerfile.app
  test:
    runs-on: ubuntu-latest
    needs:
      - lint
    defaults:
      run:
        working-directory: lab3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run tests and coverage
        run: mvn verify
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: lab3/target/site/jacoco
  build:
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: lab3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build JAR
        run: mvn clean package -DskipTests
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mywebapp
          tags: >
            type=raw,value=latest,enable={{is_default_branch}}

            type=sha,prefix=sha-

            type=raw,value=stable,
            enable=${{ startsWith(github.ref, 'refs/tags/') }}

            type=ref,event=tag
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./lab3
          file: ./lab3/Dockerfile.app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
