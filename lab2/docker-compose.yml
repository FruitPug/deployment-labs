services:
  db:
    image: mariadb:12
    container_name: mywebapp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mywebapp
      MYSQL_USER: mywebapp_user
      MYSQL_PASSWORD: strongpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./migrate.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mynetwork

  app:
    container_name: mywebapp-app
    build:
      dockerfile: Dockerfile.app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mynetwork

  nginx:
    image: nginx:1.28.3
    container_name: mywebapp-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mynetwork

volumes:
  db_data:

networks:
  mynetwork:
    driver: bridge
